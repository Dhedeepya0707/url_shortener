<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeepItShort | Modern URL Shortener</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050810;
            --accent-blue: #3b82f6;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* ATTRACTIVE BACKGROUND EFFECT */
        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
            top: 10%;
            left: 10%;
            z-index: -1;
            animation: float 10s infinite alternate;
        }

        body::after {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.1) 0%, transparent 70%);
            bottom: 10%;
            right: 5%;
            z-index: -1;
            animation: float 12s infinite alternate-reverse;
        }

        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 100px); }
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 700px;
            padding: 20px;
            z-index: 1;
        }

        /* LARGE, ATTRACTIVE LOGO */
        .logo {
            font-family: 'Lexend Deca', sans-serif; /* Stylish, rounded modern font */
            font-size: 3.5rem; /* Significantly larger as requested */
            margin-bottom: 40px;
            background: linear-gradient(to bottom, #ffffff 30%, #3b82f6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1.5px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .subcaption {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }

        /* INPUT AREA */
        .input-wrapper {
            background: rgba(30, 41, 59, 0.5);
            padding: 8px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: border-color 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-blue);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 15px 20px;
            font-size: 1rem;
            outline: none;
        }

        button#shortenBtn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        button#shortenBtn:hover {
            opacity: 0.9;
        }

        /* RESULT SECTION */
        .result-box {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            display: none;
            border: 1px dashed rgba(255, 255, 255, 0.2);
        }

        .result-link {
            display: block;
            margin-bottom: 15px;
            color: #60a5fa;
            font-size: 1.3rem;
            text-decoration: none;
            font-weight: 600;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid #4b5563;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">KeepItShort</div>
        
        <h1>Make space for what matters</h1>
        <p class="subcaption">One click. One link. Infinite possibilities.</p>

        <div class="input-wrapper">
            <input type="url" id="urlInput" placeholder="Paste your long link here..." required>
            <button id="shortenBtn">Shorten Now!</button>
        </div>

        <div id="resultBox" class="result-box">
            <a href="#" id="shortLink" class="result-link" target="_blank"></a>
            <button class="copy-btn" id="copyBtn">Copy to clipboard</button>
        </div>
    </div>

<script>
    const shortenBtn = document.getElementById('shortenBtn');
    const urlInput = document.getElementById('urlInput');
    const resultBox = document.getElementById('resultBox');
    const shortLink = document.getElementById('shortLink');

    shortenBtn.addEventListener('click', async () => {
        const longUrl = urlInput.value.trim();

        if (!longUrl) {
            alert("Please paste a URL first!");
            return;
        }

        try {
            // 1. Send data to your @PostMapping("/shorten")
            const response = await fetch('http://localhost:9090/shorten', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                // Matches the 'originalUrl' field in your Url.java entity
                body: JSON.stringify({ originalUrl: longUrl })
            });

            if (response.ok) {
                const data = await response.json();
                
                // 2. data.shortCode comes from your Url.java/UrlController logic
                const fullShortUrl = 'http://localhost:9090/' + data.shortCode;
                
                // 3. Update the UI
                shortLink.innerText = fullShortUrl;
                shortLink.href = fullShortUrl;
                resultBox.style.display = 'block';
                urlInput.value = ''; 
            } else {
                alert("Server error: " + response.status);
            }
        } catch (error) {
            console.error("Connection Error:", error);
            alert("Could not reach the backend. Make sure Spring Boot is running!");
        }
    });

    // Copy function
    document.getElementById('copyBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(shortLink.innerText);
        alert("Link copied!");
    });
</script>
</body>
</html>
